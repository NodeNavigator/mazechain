syntax = "proto3";

package blockmazechain.validatorbonus;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "blockmazechain/validatorbonus/params.proto";
import "blockmazechain/validatorbonus/eligible_validator.proto";
import "blockmazechain/validatorbonus/proposer_count.proto";
import "blockmazechain/validatorbonus/daily_reward.proto";
import "blockmazechain/validatorbonus/cycle_reward.proto";

option go_package = "blockmazechain/x/validatorbonus/types";

// Query defines the gRPC querier service.
service Query {
  
  // Parameters queries the parameters of the module.
  rpc Params (QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/blockmazechain/validatorbonus/params";
  
  }
  
  // Queries a list of EligibleValidator items.
  rpc EligibleValidator    (QueryGetEligibleValidatorRequest) returns (QueryGetEligibleValidatorResponse) {
    option (google.api.http).get = "/blockmazechain/validatorbonus/eligible_validator/{id}";
  
  }
  rpc EligibleValidatorAll (QueryAllEligibleValidatorRequest) returns (QueryAllEligibleValidatorResponse) {
    option (google.api.http).get = "/blockmazechain/validatorbonus/eligible_validator";
  
  }
  
  // Queries a list of ProposerCount items.
  rpc ProposerCount    (QueryGetProposerCountRequest) returns (QueryGetProposerCountResponse) {
    option (google.api.http).get = "/blockmazechain/validatorbonus/proposer_count/{id}";
  
  }
  rpc ProposerCountAll (QueryAllProposerCountRequest) returns (QueryAllProposerCountResponse) {
    option (google.api.http).get = "/blockmazechain/validatorbonus/proposer_count";
  
  }
  
  // Queries a list of DailyReward items.
  rpc DailyReward    (QueryGetDailyRewardRequest) returns (QueryGetDailyRewardResponse) {
    option (google.api.http).get = "/blockmazechain/validatorbonus/daily_reward/{id}";
  
  }
  rpc DailyRewardAll (QueryAllDailyRewardRequest) returns (QueryAllDailyRewardResponse) {
    option (google.api.http).get = "/blockmazechain/validatorbonus/daily_reward";
  
  }
  
  // Queries a list of CycleReward items.
  rpc CycleReward    (QueryGetCycleRewardRequest) returns (QueryGetCycleRewardResponse) {
    option (google.api.http).get = "/blockmazechain/validatorbonus/cycle_reward/{id}";
  
  }
  rpc CycleRewardAll (QueryAllCycleRewardRequest) returns (QueryAllCycleRewardResponse) {
    option (google.api.http).get = "/blockmazechain/validatorbonus/cycle_reward";
  
  }
  
  // Queries a list of ValidatorCycleReward items.
  rpc ValidatorCycleReward (QueryValidatorCycleRewardRequest) returns (QueryValidatorCycleRewardResponse) {
    // NOTE: The validatorAddress field is interpreted as a user wallet address (bech32 or 0x)
    // and converted inside the keeper to the validator operator (valoper) address.
    option (google.api.http).get = "/blockmazechain/validatorbonus/validator_cycle_reward/{validatorAddress}/{cycle}";
  }
  
  // Queries a list of CycleRewards items.
  rpc CycleRewards (QueryCycleRewardsRequest) returns (QueryCycleRewardsResponse) {
    option (google.api.http).get = "/blockmazechain/validatorbonus/cycle_rewards/{cycle}";
  
  }
}
// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  
  // params holds all the parameters of this module.
  Params params = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

message QueryGetEligibleValidatorRequest {
  string id = 1;
}

message QueryGetEligibleValidatorResponse {
  EligibleValidator eligibleValidator = 1 [(gogoproto.nullable) = false];
}

message QueryAllEligibleValidatorRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllEligibleValidatorResponse {
  repeated EligibleValidator                      eligibleValidator = 1 [(gogoproto.nullable) = false];
           cosmos.base.query.v1beta1.PageResponse pagination        = 2;
}

message QueryGetProposerCountRequest {
  string id = 1;
}

message QueryGetProposerCountResponse {
  ProposerCount proposerCount = 1 [(gogoproto.nullable) = false];
}

message QueryAllProposerCountRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllProposerCountResponse {
  repeated ProposerCount                          proposerCount = 1 [(gogoproto.nullable) = false];
           cosmos.base.query.v1beta1.PageResponse pagination    = 2;
}

message QueryGetDailyRewardRequest {
  string id = 1;
}

message QueryGetDailyRewardResponse {
  DailyReward dailyReward = 1 [(gogoproto.nullable) = false];
}

message QueryAllDailyRewardRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllDailyRewardResponse {
  repeated DailyReward                            dailyReward = 1 [(gogoproto.nullable) = false];
           cosmos.base.query.v1beta1.PageResponse pagination  = 2;
}

message QueryGetCycleRewardRequest {
  string id = 1;
}

message QueryGetCycleRewardResponse {
  CycleReward cycleReward = 1 [(gogoproto.nullable) = false];
}

message QueryAllCycleRewardRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllCycleRewardResponse {
  repeated CycleReward                            cycleReward = 1 [(gogoproto.nullable) = false];
           cosmos.base.query.v1beta1.PageResponse pagination  = 2;
}

message QueryValidatorCycleRewardRequest {
  string validatorAddress = 1;
  uint64 cycle            = 2;
  string reward           = 3;
  bool   isValidator      = 4;
}

message QueryValidatorCycleRewardResponse {
  bool   isEligible = 1;
  string reward     = 2;
}

message QueryCycleRewardsRequest {
  uint64                                cycle      = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryCycleRewardsResponse {
  repeated string                        validators = 1;
  repeated string                        rewards    = 2;
           cosmos.base.query.v1beta1.PageResponse pagination = 3;
}

