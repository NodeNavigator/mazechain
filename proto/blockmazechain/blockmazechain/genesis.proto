syntax = "proto3";
package blockmazechain.blockmazechain;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "blockmazechain/blockmazechain/params.proto";

option go_package = "blockmazechain/x/blockmazechain/types";

// GenesisState defines the blockmazechain module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
